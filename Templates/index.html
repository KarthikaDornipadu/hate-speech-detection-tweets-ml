<!DOCTYPE html>
<html>
<head>
    <title>Hate Speech Detection</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="header">
    Detecting Hate Speech in Tweets with Advanced Machine Learning Techniques
</div>

<div class="container">

    <form action="/predict" method="POST">

        <h2>Enter your text for Hate Speech Detection in English</h2>

        <textarea
            name="tweet"
            rows="10"
            cols="60"
            placeholder="Enter your text here...">{{ tweet if tweet else "" }}</textarea>

        <br><br>

        <button type="submit">
            Analyze Text
        </button>

    </form>

    {% if prediction %}

    <h3 class="result">
        {{ prediction }}
    </h3>

    {% endif %}

</div>

</body>
</html>
